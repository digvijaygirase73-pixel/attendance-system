{% extends "base.html" %}
{% block title %}{{ 'Edit' if student else 'Add' }} Student{% endblock %}
{% block page_title %}{{ 'Edit' if student else 'Add' }} Student{% endblock %}
{% block content %}
<div style="max-width:560px">
  <div class="card">
    <div class="card-header">
      <span class="card-title">{{ 'Edit Student Details' if student else 'New Student' }}</span>
      <span class="badge badge-blue">Admin Only</span>
    </div>
    <div class="card-body">
      <form method="POST">
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Full Name *</label>
            <input class="form-input" type="text" name="name" value="{{ student.name if student else '' }}" placeholder="e.g. Aarav Shah" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Roll Number *</label>
            <input class="form-input" type="text" name="roll_no" value="{{ student.roll_no if student else '' }}" placeholder="e.g. 01" required/>
          </div>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Division *</label>
            <input class="form-input" type="text" name="division" value="{{ student.division if student else '' }}" placeholder="e.g. 4AI4" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" type="email" name="email" value="{{ student.email if student else '' }}" placeholder="student@school.com"/>
          </div>
        </div>
        <div class="flex gap-3 mt-4">
          <button type="submit" class="btn btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            {{ 'Save Changes' if student else 'Add Student' }}
          </button>
          <a href="{{ url_for('students') }}" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
