<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Attendance Marked</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0d0f14;--surface:#161a23;--border:#262c3a;--accent:#4fd1c5;--accent2:#f6ad55;--text:#e8eaf0;--muted:#7a8099}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    nav{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 2.5rem;border-bottom:1px solid var(--border);background:var(--surface)}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;color:var(--accent)}
    nav a{color:var(--muted);text-decoration:none;font-size:.9rem;margin-left:2rem}
    nav a:hover{color:var(--text)}
    .container{max-width:860px;margin:0 auto;padding:3rem 1.5rem}
    .confirm{text-align:center;padding:6rem 0}
    .icon{font-size:4rem;margin-bottom:1.2rem}
    h1{font-family:'Syne',sans-serif;font-size:2.2rem;margin-bottom:.8rem}
    p{color:var(--muted);font-size:1rem;margin-bottom:2.5rem;line-height:1.7}
    .name{color:var(--accent2);font-weight:600}
    .status-present{color:#4fd1a5;font-weight:700}
    .status-absent{color:#f87171;font-weight:700}
    .btn{display:inline-block;padding:.75rem 1.8rem;border-radius:8px;text-decoration:none;font-weight:500;font-size:.95rem;margin:.4rem;transition:opacity .2s}
    .btn:hover{opacity:.8}
    .btn-primary{background:var(--accent);color:#0d0f14}
    .btn-ghost{border:1px solid var(--border);color:var(--text)}
  </style>
</head>
<body>
<nav>
  <span class="logo">⬡ AttendanceOS</span>
  <div><a href="/">Home</a><a href="/attendance">View Records</a></div>
</nav>
<div class="container">
  <div class="confirm">
    <div class="icon">{{ "✅" if status == "Present" else "❌" }}</div>
    <h1>Attendance Marked!</h1>
    <p>
      <span class="name">{{ name }}</span> has been marked as
      <span class="{{ 'status-present' if status == 'Present' else 'status-absent' }}">{{ status }}</span>.
    </p>
    <a href="/" class="btn btn-ghost">← Back to Home</a>
    <a href="/attendance" class="btn btn-primary">View All Records</a>
  </div>
</div>
</body>
</html>
